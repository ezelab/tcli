name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: tcli-linux-x86_64
          - os: macos-latest
            artifact: tcli-darwin-arm64
          - os: windows-latest
            artifact: tcli-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Tesseract (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr libtesseract-dev

      - name: Install Tesseract (macOS)
        if: runner.os == 'macOS'
        run: brew install tesseract

      - name: Install Tesseract (Windows)
        if: runner.os == 'Windows'
        run: choco install tesseract

      - name: Build native image
        shell: bash
        run: |
          chmod +x gradlew
          ./gradlew nativeCompile

      - name: Rename binary
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/native/nativeCompile/tcli.exe ${{ matrix.artifact }}
          else
            cp build/native/nativeCompile/tcli ${{ matrix.artifact }}
          fi

      - name: Smoke test
        shell: bash
        run: |
          chmod +x ${{ matrix.artifact }} 2>/dev/null || true
          ./${{ matrix.artifact }} --version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
